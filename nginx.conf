server { listen 80; server_name _; return 301 https://$host$request_uri; }
server {
  listen 443 ssl; server_name _;
  ssl_certificate /etc/letsencrypt/live/ai.moones.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai.moones.top/privkey.pem;
  location /health { proxy_pass http://api:4000/health; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
  location /api/ { proxy_pass http://api:4000/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Cookie $http_cookie; }
  location / { proxy_pass http://admin:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Cookie $http_cookie; }
}
