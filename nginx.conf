server {
  listen 80;
  server_name ai.moones.top;
  client_max_body_size 50m;
  location /api/ { proxy_pass http://api:4000/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Real-IP $remote_addr; }
  location /health { proxy_pass http://api:4000/health; }
  location / { proxy_pass http://admin:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
}
