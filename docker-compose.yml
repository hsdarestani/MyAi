services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: moones }
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres -d moones"], interval: 10s, timeout: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 10 }
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    env_file: .env
    environment: { DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moones, REDIS_URL: redis://redis:6379 }
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q Osta"], interval: 10s, timeout: 5s, retries: 10 }
  bot:
    build: { context: ., dockerfile: apps/bot/Dockerfile }
    env_file: .env
    environment: { API_URL: http://api:4000, DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moones, REDIS_URL: redis://redis:6379 }
    depends_on:
      api: { condition: service_healthy }
  admin:
    build: { context: ., dockerfile: apps/admin/Dockerfile }
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      api: { condition: service_healthy }
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api: { condition: service_healthy }
      admin: { condition: service_started }
    ports: ["80:80", "443:443"]
volumes: { pgdata: {} }
